apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    project: my-project-cal-deployment  
spec:
  replicas: 10
  selector:
    matchLabels:
      project: my-project-cal-pod1
  template:
    metadata:
      labels:
        project: my-project-cal-pod1
    spec:
      containers:
        - name: my-container-cal-pod1
          image: sharjikahamed/mdcalculator
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
  labels:
    project: my-project-cal-service
spec:
  type: NodePort
  selector:
    project: my-project-cal-pod1
  ports:  
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30001